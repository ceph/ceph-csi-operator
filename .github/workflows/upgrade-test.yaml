name: upgrade-test

on:
  pull_request:
    branches:
      - main
      - release-*
    paths-ignore:
      - 'docs/**' # ignore all the documents
      - '*.md' # Ignore the Readme and PendingReleaseNote file
      - '.*' # Ignore the config files

defaults:
  run:
    # reference: https://docs.github.com/en/actions/reference/workflow-syntax-for-github-actions#using-a-specific-shell
    shell: bash --noprofile --norc -eo pipefail -x {0}

# cancel the in-progress workflow when PR is refreshed.
concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'pull_request' && github.head_ref || github.sha }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  yaml-upgrade-test:
    runs-on: ubuntu-latest
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
            fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Setup Minikube
        run: |
            test/scripts/github-action-helper.sh install_minikube_with_none_driver

      - name: print k8s cluster status
        run: |
            kubectl get nodes

      - name: use local disk
        run: test/scripts/github-action-helper.sh use_local_disk

      - name: create ceph cluster
        run: test/scripts/github-action-helper.sh deploy_rook

      - name: Get latest release version
        id: get_release
        run: |
          RELEASE_VERSION=$(gh release list --limit 1 --exclude-drafts --exclude-pre-releases --json tagName --jq '.[0].tagName')
          echo "release_version=${RELEASE_VERSION}" >> $GITHUB_OUTPUT
          echo "Latest release version: ${RELEASE_VERSION}"
        env:
          GH_TOKEN: ${{ github.token }}

      - name: run yaml upgrade test
        env:
          RELEASE_VERSION: ${{ steps.get_release.outputs.release_version }}
        run: test/scripts/test-upgrade-yaml.sh

  helm-upgrade-test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        driver:
          - cephfs
          - rbd
          - nfs
    steps:
      - name: checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
            fetch-depth: 0

      - uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version-file: go.mod

      - name: Setup Minikube
        run: |
            test/scripts/github-action-helper.sh install_minikube_with_none_driver

      - name: print k8s cluster status
        run: |
            kubectl get nodes

      - name: use local disk
        run: test/scripts/github-action-helper.sh use_local_disk

      - name: create ceph cluster
        run: test/scripts/github-action-helper.sh deploy_rook

      - name: Install snapshot controller
        run: test/scripts/install-snapshot.sh install

      - name: run helm upgrade test
        env:
          DRIVER_TYPE: ${{ matrix.driver }}
        run: test/scripts/test-upgrade-helm.sh
