{{- if .Values.openshift.enabled }}
{{- $root := . -}}
{{- range $driver := .Values.drivers -}}
{{- if $driver.enabled }}
{{- $normalizedDriverName := include "normalizeDriverName" $driver.name }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $normalizedDriverName }}-ctrlplugin-scc-{{ $root.Release.Namespace }}
  labels:
    app.kubernetes.io/name: ceph-csi-drivers
    app.kubernetes.io/instance: {{ $root.Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $root.Values.openshift.sccClusterRoleName }}
subjects:
  - kind: ServiceAccount
    name: {{ $normalizedDriverName }}-ctrlplugin-sa
    namespace: {{ $root.Release.Namespace }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: {{ $normalizedDriverName }}-nodeplugin-scc-{{ $root.Release.Namespace }}
  labels:
    app.kubernetes.io/name: ceph-csi-drivers
    app.kubernetes.io/instance: {{ $root.Release.Name }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: {{ $root.Values.openshift.sccClusterRoleName }}
subjects:
  - kind: ServiceAccount
    name: {{ $normalizedDriverName }}-nodeplugin-sa
    namespace: {{ $root.Release.Namespace }}
{{- end }}
{{- end }}
{{- end }}
