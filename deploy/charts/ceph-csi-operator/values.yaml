cephfsCtrlpluginSa:
  serviceAccount:
    annotations: {}
cephfsNodepluginSa:
  serviceAccount:
    annotations: {}
controllerManager:
  kubeRbacProxy:
    args:
    - --secure-listen-address=0.0.0.0:8443
    - --upstream=http://127.0.0.1:8080/
    - --v=0
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: true
    image:
      repository: gcr.io/kubebuilder/kube-rbac-proxy
      tag: v0.16.0
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 5m
        memory: 64Mi
  manager:
    args:
    - --health-probe-bind-address=:8081
    - --metrics-bind-address=127.0.0.1:8080
    - --leader-elect
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: true
    env:
      csiServiceAccountPrefix: ceph-csi-operator-
      watchNamespace: ""
    image:
      repository: quay.io/cephcsi/ceph-csi-operator
      tag: latest
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
  podSecurityContext:
    runAsNonRoot: true
  replicas: 1
  serviceAccount:
    annotations: {}
kubernetesClusterDomain: cluster.local
metricsService:
  ports:
  - name: https
    port: 8443
    protocol: TCP
    targetPort: https
  type: ClusterIP
nfsCtrlpluginSa:
  serviceAccount:
    annotations: {}
nfsNodepluginSa:
  serviceAccount:
    annotations: {}
rbdCtrlpluginSa:
  serviceAccount:
    annotations: {}
rbdNodepluginSa:
  serviceAccount:
    annotations: {}
