cephfsCtrlpluginSa:
  serviceAccount:
    annotations: {}
cephfsNodepluginSa:
  serviceAccount:
    annotations: {}
controllerManager:
  manager:
    args:
    - --leader-elect
    - --webhook-cert-path=/tmp/k8s-webhook-server/serving-certs
    containerSecurityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: true
    env:
      csiServiceAccountPrefix: ceph-csi-operator-
      watchNamespace: ""
    image:
      repository: quay.io/cephcsi/ceph-csi-operator
      tag: latest
    resources:
      limits:
        cpu: 500m
        memory: 128Mi
      requests:
        cpu: 10m
        memory: 64Mi
  podSecurityContext:
    runAsNonRoot: true
  replicas: 1
  serviceAccount:
    annotations: {}
kubernetesClusterDomain: cluster.local
nfsCtrlpluginSa:
  serviceAccount:
    annotations: {}
nfsNodepluginSa:
  serviceAccount:
    annotations: {}
rbdCtrlpluginSa:
  serviceAccount:
    annotations: {}
rbdNodepluginSa:
  serviceAccount:
    annotations: {}
webhookService:
  ports:
  - port: 443
    protocol: TCP
    targetPort: 9443
  type: ClusterIP
