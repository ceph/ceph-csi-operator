# This rule is not used by the project ceph-csi-operator itself.
# It is provided to allow the cluster admin to help manage permissions for users.
#
# Grants read-only access to csi.ceph.io resources.
# This role is intended for users who need visibility into these resources
# without permissions to modify them. It is ideal for monitoring purposes and limited-access viewing.

apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  labels:
    app.kubernetes.io/name: ceph-csi-operator
    app.kubernetes.io/managed-by: kustomize
  name: clientprofilereplication-viewer-role
rules:
- apiGroups:
  - csi.ceph.io
  resources:
  - clientprofilereplications
  verbs:
  - get
  - list
  - watch
- apiGroups:
  - csi.ceph.io
  resources:
  - clientprofilereplications/status
  verbs:
  - get
